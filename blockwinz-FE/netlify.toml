[[redirects]]
  from = "/*"
  to = "/"
  status = 200

# Baseline hardening; tighten Content-Security-Policy once inline scripts are nonced/hashed.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Tune connect-src if your API or WebSocket host changes (see VITE_REACT_APP_SERVER_BASE_URL / WS_URL).
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' data: blob: https://blockwinz.com https://staging.blockwinz.com https://*.blockwinz.com https://bwzfunding.netlify.app wss://blockwinz.com wss://staging.blockwinz.com wss://*.blockwinz.com http://localhost:* ws://localhost:*;"